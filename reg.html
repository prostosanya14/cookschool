    <script src="js/header-logic.js"></script>

</head>
<body>
<div class="container">
    <header>
        <a href="./index.html" class="logo-a"><img src="img/logo.jpg" alt="logo" class="logo" id="#!"></a>
        <div class="menu">
            <ul class="nav">
                <a href="./index.html">
                    <li>Главная</li>
                </a>
                <a href="./teacher.html">
                    <li>Преподаватели</li>

                <a href="./about.html">
                    <li>О нас</li>
                </a>
                <a id="accountLink" href="./account.html">
                    <li>Личный кабинет</li>
                </a>
                <a id="adminLink" href="./admin.html">
                    <li>Панель администратора</li>
                </a>
            </ul>
        </div>
        <div class="loginquit">
            <a id="loginButton" href="./login.html">
                <button type="submit" class="button">Войти</button>
            </a>
            <a id="quitButton" href="#!">
                <button type="submit" class="button">Выйти</button>
            </a>
        </div>
    </header>
    <h1 class="kurs-prev2">Регистрация</h1>
    <form id="regin-form" class="form2">
        <div class="form-inputs">
            ФИО Ребенка<input type="text" id="name-kid" minlength="8" required
                              placeholder="Укажите здесь ФИО ребенка...">
            Возраст ребенка<input type="number" id="age" required placeholder="Укажите здесь возраст ребенка...">
            Почта<input type="email" minlength="6" required id="email" placeholder="Укажите здесь вашу почту...">
            Пароль<input type="password" minlength="8" required id="pass" placeholder="Укажите здесь ваш пароль...">
            Повтор пароля<input type="password" minlength="8" required id="passrepeat"
                                placeholder="Повторите здесь ваш пароль...">
        </div>

        <button class="button-form" type="submit">Зарегистрироваться</button>
        <p class="form-link">У вас уже есть аккаунт?
            <a href="./login.html" class="form-a">Авторизоваться
        </p>
        </a>
    </form>

    <footer class="footer2">
        <div class="footer-link">
            <ul class="app">
                <li>
                    <a href="#!"><img src="img/vkon.svg" alt="vk"></a>
